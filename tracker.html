<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最近一次</title>
  <link rel="manifest" href="./manifest-tracker.json">
  <link rel="icon" href="./tracker%20icon.png" type="image/png">
  <link rel="apple-touch-icon" href="./tracker%20icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="最近一次">
  <meta name="theme-color" content="#f8f1df">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }

    :root {
      --paper: #f8f1df;
      --paper-deep: #efe4cc;
      --card: rgba(255, 252, 240, 0.82);
      --ink: #31362e;
      --muted: #837e70;
      --faint: #aaa391;
      --sage: #68794b;
      --sage-soft: #dfe3c9;
      --terra: #b85135;
      --terra-soft: #efd5c6;
      --line: rgba(100, 88, 63, 0.17);
      --shadow: 0 12px 30px rgba(92, 77, 50, 0.08);
      --serif: "Songti SC", "STSong", "SimSun", serif;
      --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    html { background: var(--paper); }
    body {
      min-height: 100vh;
      color: var(--ink);
      background-color: var(--paper);
      font-family: var(--serif);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    button, input { font: inherit; }
    button { color: inherit; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes stamp {
      0% { transform: rotate(-3deg) scale(1); }
      40% { transform: rotate(-3deg) scale(0.9); }
      72% { transform: rotate(-3deg) scale(1.06); }
      100% { transform: rotate(-3deg) scale(1); }
    }
    @keyframes fresh {
      0% { background-color: var(--card); }
      34% { background-color: rgba(219, 225, 192, 0.9); }
      100% { background-color: var(--card); }
    }

    .page-shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 42px 18px 90px;
    }

    .hero {
      position: relative;
      min-height: 196px;
      padding: 8px 4px 28px;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      animation: rise 0.45s ease both;
    }
    .hero-copy { position: relative; z-index: 1; }
    .hero h1 {
      font-size: clamp(40px, 7vw, 62px);
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .hero-sub {
      margin-top: 9px;
      color: var(--muted);
      font-size: clamp(16px, 2.8vw, 21px);
      letter-spacing: 0.08em;
    }
    .today-line {
      margin-top: 35px;
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 6px 13px;
      border: 1px solid rgba(104, 121, 75, 0.3);
      border-radius: 11px;
      color: #4e5941;
      background: rgba(255, 252, 240, 0.56);
      font-family: var(--sans);
      font-size: 15px;
      letter-spacing: 0.04em;
    }
    .hero-wash {
      position: absolute;
      z-index: 0;
      top: -76px;
      right: -88px;
      width: 285px;
      height: 285px;
      object-fit: contain;
      opacity: 0.86;
      pointer-events: none;
    }

    .tracker-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding-top: 24px;
      align-items: start;
    }

    .item-card {
      --accent: var(--sage);
      --accent-soft: var(--sage-soft);
      position: relative;
      min-width: 0;
      overflow: hidden;
      border: 1px solid rgba(116, 102, 72, 0.18);
      border-radius: 28px 23px 27px 22px;
      background-color: var(--card);
      box-shadow: var(--shadow);
      animation: rise 0.4s ease both;
    }
    .item-card.terra {
      --accent: var(--terra);
      --accent-soft: var(--terra-soft);
    }
    .item-card.flash { animation: fresh 0.7s ease; }
    .card-core {
      min-height: 358px;
      padding: 22px 20px 17px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 108px;
      grid-template-rows: auto 1fr auto;
      column-gap: 13px;
    }
    .card-heading {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-width: 0;
    }
    .sticker-wrap {
      width: 72px;
      height: 72px;
      border-radius: 47% 53% 45% 55%;
      background-color: color-mix(in srgb, var(--accent-soft) 52%, transparent);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .sticker {
      width: 70px;
      height: 70px;
      object-fit: contain;
      display: block;
    }
    .item-name {
      min-width: 0;
      font-size: 25px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.035em;
      overflow-wrap: anywhere;
    }
    .manage-btn {
      align-self: start;
      justify-self: end;
      padding: 8px 3px;
      border: 0;
      background: transparent;
      color: var(--faint);
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
    }
    .manage-btn:hover, .manage-btn:focus-visible { color: var(--accent); }

    .distance-block {
      align-self: center;
      padding: 10px 0 7px 8px;
    }
    .distance-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .distance-number {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(78px, 21vw, 112px);
      line-height: 0.88;
      letter-spacing: -0.07em;
    }
    .distance-word {
      font-size: 34px;
      letter-spacing: 0.08em;
    }
    .distance-main.text-only .distance-number {
      font-family: var(--serif);
      font-size: 48px;
      letter-spacing: 0.03em;
      line-height: 1.15;
    }
    .last-date {
      margin-top: 15px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .log-btn {
      width: 102px;
      height: 102px;
      align-self: center;
      justify-self: end;
      border: 3px double var(--accent);
      border-radius: 50%;
      background: rgba(255, 252, 240, 0.34);
      color: var(--accent);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: 0.08em;
      transform: rotate(-3deg);
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .log-btn:hover { background-color: color-mix(in srgb, var(--accent-soft) 45%, transparent); }
    .log-btn.popping { animation: stamp 0.38s ease; }

    .growth {
      grid-column: 1 / -1;
      position: relative;
      height: 56px;
      margin-top: 4px;
      display: grid;
      grid-template-columns: 44px 1fr 34px;
      align-items: end;
      gap: 0;
    }
    .sprout {
      width: 44px;
      height: 44px;
      object-fit: contain;
      align-self: end;
      position: relative;
      z-index: 2;
    }
    .growth-track {
      position: relative;
      height: 30px;
      border-bottom: 2px solid color-mix(in srgb, var(--accent) 82%, transparent);
      display: flex;
      align-items: end;
      justify-content: flex-end;
      gap: clamp(3px, 1.2vw, 7px);
      padding: 0 4px 5px;
      overflow: hidden;
    }
    .growth-dot {
      flex: 0 0 auto;
      width: var(--dot-size);
      height: var(--dot-size);
      border-radius: 50% 43% 51% 46%;
      background-color: var(--accent);
      opacity: calc(0.36 + var(--dot-index) * 0.055);
    }
    .today-mark {
      height: 42px;
      border-left: 2px solid var(--ink);
      color: var(--muted);
      font-family: var(--sans);
      font-size: 12px;
      line-height: 1;
      padding: 0 0 0 5px;
      display: flex;
      align-items: flex-start;
    }

    .card-menu {
      display: none;
      padding: 0 20px 16px;
      gap: 8px;
      justify-content: flex-end;
    }
    .card-menu.open { display: flex; }
    .menu-action {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 252, 240, 0.68);
      color: var(--muted);
      padding: 8px 13px;
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
    }
    .menu-action:hover { color: var(--accent); border-color: var(--accent); }
    .menu-action.delete:hover { color: var(--terra); border-color: var(--terra); }

    .history-panel {
      display: none;
      border-top: 1px solid var(--line);
      padding: 18px 20px 20px;
      background-color: rgba(239, 228, 204, 0.28);
    }
    .history-panel.open { display: block; }
    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 11px;
    }
    .history-title { font-size: 16px; font-weight: 700; }
    .history-count { color: var(--faint); font-family: var(--sans); font-size: 12px; }
    .history-list { display: grid; gap: 5px; }
    .history-entry {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      border-bottom: 1px dashed var(--line);
      color: var(--muted);
      font-family: var(--sans);
      font-size: 13px;
    }
    .history-entry:last-child { border-bottom: 0; }
    .history-ago { color: var(--faint); }
    .history-del {
      border: 0;
      background: transparent;
      color: var(--faint);
      font-family: var(--sans);
      font-size: 12px;
      cursor: pointer;
    }
    .history-del:hover { color: var(--terra); }
    .history-empty { color: var(--faint); font-family: var(--sans); font-size: 13px; }

    .add-card {
      width: 100%;
      min-height: 82px;
      margin-top: 18px;
      border: 2px dashed rgba(104, 121, 75, 0.58);
      border-radius: 28px;
      background: rgba(255, 252, 240, 0.36);
      color: var(--sage);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background-color 0.18s, transform 0.18s;
    }
    .add-card:hover { background-color: rgba(223, 227, 201, 0.5); }
    .add-card:active { transform: scale(0.99); }

    .tool-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 22px;
    }
    .tool-btn {
      border: 0;
      background: transparent;
      color: var(--faint);
      padding: 7px;
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
    }
    .tool-btn:hover { color: var(--sage); }

    .empty-state {
      grid-column: 1 / -1;
      padding: 54px 20px 42px;
      text-align: center;
      color: var(--muted);
    }
    .empty-state img { width: 90px; height: 90px; object-fit: contain; }
    .empty-state h2 { margin-top: 8px; font-size: 22px; }
    .empty-state p { margin-top: 7px; font-family: var(--sans); font-size: 14px; }

    .toast {
      position: fixed;
      z-index: 50;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      max-width: calc(100vw - 36px);
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(49, 54, 46, 0.91);
      color: #fffaf0;
      font-family: var(--sans);
      font-size: 13px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 40;
      padding: 18px;
      align-items: flex-end;
      justify-content: center;
      background: rgba(49, 43, 32, 0.25);
      backdrop-filter: blur(5px);
    }
    .modal-bg.open { display: flex; }
    .modal {
      width: min(560px, 100%);
      max-height: min(780px, calc(100vh - 36px));
      overflow: auto;
      padding: 23px 20px 28px;
      border: 1px solid rgba(116, 102, 72, 0.2);
      border-radius: 28px 28px 18px 18px;
      background: #fffaf0;
      box-shadow: 0 22px 60px rgba(65, 51, 29, 0.2);
      animation: rise 0.25s ease both;
    }
    .modal-title { font-size: 22px; font-weight: 700; }
    .modal-field { margin-top: 18px; }
    .modal-label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
    }
    .modal-input {
      width: 100%;
      min-height: 48px;
      border: 1.5px solid rgba(104, 121, 75, 0.25);
      border-radius: 14px;
      background: var(--paper);
      color: var(--ink);
      padding: 11px 13px;
      outline: 0;
      font-family: var(--sans);
      font-size: 16px;
    }
    .modal-input:focus { border-color: var(--sage); }
    .sticker-picker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }
    .sticker-choice {
      aspect-ratio: 1;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: var(--paper);
      padding: 4px;
      cursor: pointer;
    }
    .sticker-choice img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .sticker-choice.selected {
      border: 2px solid var(--sage);
      background: var(--sage-soft);
    }
    .sticker-hint {
      margin-top: 7px;
      color: var(--faint);
      font-family: var(--sans);
      font-size: 12px;
    }
    .modal-btns { display: flex; gap: 9px; margin-top: 22px; }
    .modal-btn {
      min-height: 48px;
      border-radius: 14px;
      font-family: var(--sans);
      font-size: 15px;
      cursor: pointer;
    }
    .modal-cancel {
      flex: 1;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--muted);
    }
    .modal-confirm {
      flex: 2;
      border: 0;
      background: var(--sage);
      color: #fffaf0;
      font-weight: 700;
    }
    input[type="file"] { display: none; }

    @media (max-width: 719px) {
      .page-shell { padding: 30px 14px 68px; }
      .hero { min-height: 168px; padding: 4px 2px 21px; }
      .hero h1 { font-size: 40px; }
      .hero-sub { margin-top: 7px; font-size: 15px; }
      .today-line { margin-top: 23px; min-height: 34px; padding: 5px 11px; font-size: 13px; }
      .hero-wash { width: 228px; height: 228px; top: -62px; right: -76px; }

      .tracker-grid { gap: 12px; padding-top: 16px; }
      .item-card { border-radius: 23px 19px 22px 18px; }
      .card-core {
        min-height: 252px;
        padding: 14px 15px 10px;
        grid-template-columns: minmax(0, 1fr) 84px;
        grid-template-rows: auto auto auto;
        column-gap: 8px;
        row-gap: 2px;
      }
      .card-heading { grid-template-columns: 56px minmax(0, 1fr); gap: 9px; }
      .sticker-wrap { width: 56px; height: 56px; }
      .sticker { width: 55px; height: 55px; }
      .item-name { font-size: 22px; }
      .manage-btn { padding: 5px 2px; font-size: 12px; }
      .distance-block { padding: 6px 0 4px 5px; }
      .distance-number { font-size: clamp(66px, 19vw, 82px); }
      .distance-word { font-size: 27px; }
      .distance-main.text-only .distance-number { font-size: 36px; }
      .last-date { margin-top: 10px; font-size: 13px; }
      .log-btn { width: 80px; height: 80px; font-size: 17px; }
      .growth {
        height: 42px;
        margin-top: 0;
        grid-template-columns: 34px 1fr 30px;
      }
      .sprout { width: 34px; height: 34px; }
      .growth-track {
        height: 23px;
        gap: clamp(2px, 1vw, 5px);
        padding: 0 3px 3px;
      }
      .today-mark { height: 32px; padding-left: 4px; font-size: 11px; }
      .card-menu { padding: 0 15px 12px; }
      .history-panel { padding: 15px; }
      .add-card { min-height: 66px; margin-top: 14px; }
      .tool-row { margin-top: 15px; }
    }

    @media (min-width: 720px) {
      .page-shell { padding: 56px 28px 100px; }
      .hero { min-height: 214px; padding-left: 8px; }
      .hero-wash { width: 360px; height: 360px; top: -112px; right: -42px; }
      .tracker-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
      .distance-number { font-size: clamp(82px, 10vw, 110px); }
      .add-card { min-height: 92px; }
      .modal-bg { align-items: center; }
      .modal { border-radius: 28px; }
    }
    @media (min-width: 1120px) {
      .tracker-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .card-core { min-height: 366px; padding: 22px 19px 17px; grid-template-columns: minmax(0, 1fr) 98px; }
      .log-btn { width: 94px; height: 94px; }
      .distance-number { font-size: 98px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <img class="hero-wash" src="./assets/tracker-stickers/watercolor-wash.png" alt="" aria-hidden="true">
      <div class="hero-copy">
        <h1>最近一次</h1>
        <p class="hero-sub">生活里的事，离现在有多远</p>
        <div class="today-line" id="todayLine"></div>
      </div>
    </header>

    <section class="tracker-grid" id="itemList" aria-live="polite"></section>
    <button class="add-card" id="addBtn">添加一件事</button>
    <div class="tool-row">
      <button class="tool-btn" id="exportBtn">导出备份</button>
      <button class="tool-btn" id="importBtn">导入备份</button>
    </div>
    <input type="file" id="importFile" accept=".json,application/json">
  </main>

  <div class="toast" id="toast" role="status"></div>

  <div class="modal-bg" id="modalBg" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 class="modal-title" id="modalTitle">添加记录项</h2>
      <div class="modal-field">
        <label class="modal-label" for="inputName">这件事叫什么</label>
        <input class="modal-input" id="inputName" type="text" placeholder="比如：换床单" autocomplete="off">
      </div>
      <div class="modal-field">
        <span class="modal-label">选择手绘贴纸</span>
        <div class="sticker-picker" id="stickerPicker"></div>
        <p class="sticker-hint">输入名称后会自动猜，也可以自己换。</p>
      </div>
      <div class="modal-btns">
        <button class="modal-btn modal-cancel" id="modalCancel">取消</button>
        <button class="modal-btn modal-confirm" id="modalConfirm">保存</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'xiaoshanTracker_v1';
    const STICKERS = {
      drink: { label: '奶茶或咖啡', src: './assets/tracker-stickers/drink.png' },
      bedding: { label: '换床单', src: './assets/tracker-stickers/bedding.png' },
      laundry: { label: '洗衣服', src: './assets/tracker-stickers/laundry.png' },
      toilet: { label: 'WC 大号', src: './assets/tracker-stickers/toilet.png' },
      toothbrush: { label: '刷牙', src: './assets/tracker-stickers/toothbrush.png' },
      skincare: { label: '护肤', src: './assets/tracker-stickers/skincare.png' },
      shower: { label: '洗澡', src: './assets/tracker-stickers/shower.png' },
      hairwash: { label: '洗头', src: './assets/tracker-stickers/hairwash.png' }
    };
    const STICKER_ORDER = Object.keys(STICKERS);
    const TERRA_STICKERS = new Set(['drink', 'toilet', 'skincare', 'hairwash']);

    function safeData(value) {
      return value && Array.isArray(value.items) && Array.isArray(value.log || [])
        ? { items: value.items, log: value.log || [] }
        : { items: [], log: [] };
    }
    function getData() {
      try { return safeData(JSON.parse(localStorage.getItem(STORAGE_KEY))); }
      catch { return { items: [], log: [] }; }
    }
    function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    function escapeHTML(value) {
      return String(value ?? '').replace(/[&<>'"]/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[char]));
    }
    function inferSticker(name) {
      const text = String(name || '').toLowerCase();
      if (/(奶茶|咖啡|拿铁|饮料|茶)/.test(text)) return 'drink';
      if (/(床单|被套|床品|枕套|换床)/.test(text)) return 'bedding';
      if (/(洗衣|衣服|袜子)/.test(text)) return 'laundry';
      if (/(大号|wc|厕所|便便|排便)/.test(text)) return 'toilet';
      if (/(刷牙|牙齿|牙刷)/.test(text)) return 'toothbrush';
      if (/(护肤|面霜|面膜|乳液|精华)/.test(text)) return 'skincare';
      if (/(洗头|护发|头发)/.test(text)) return 'hairwash';
      if (/(洗澡|淋浴|沐浴)/.test(text)) return 'shower';
      return 'bedding';
    }
    function stickerFor(item) { return STICKERS[item.sticker] ? item.sticker : inferSticker(item.name); }

    function formatToday() {
      const d = new Date();
      const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
      return `今天 ${d.getMonth() + 1} 月 ${d.getDate()} 日 · ${weekdays[d.getDay()]}`;
    }
    function formatShortDate(ts) {
      const d = new Date(ts);
      return `${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    }
    function formatHistoryTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const prefix = d.toDateString() === now.toDateString() ? '今天' : `${d.getMonth()+1}月${d.getDate()}日`;
      return `${prefix} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    function distanceParts(ts) {
      if (!ts) return { number: '还没有', unit: '', textOnly: true, ago: '还没有记录过' };
      const diff = Math.max(0, Date.now() - ts);
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (mins < 1) return { number: '刚刚', unit: '', textOnly: true, ago: '刚刚' };
      if (mins < 60) return { number: mins, unit: '分', textOnly: false, ago: `${mins} 分钟前` };
      if (hours < 24) return { number: hours, unit: '时', textOnly: false, ago: `${hours} 小时前` };
      if (days < 30) return { number: days, unit: '天', textOnly: false, ago: `${days} 天前` };
      const months = Math.floor(days / 30);
      if (months < 12) return { number: months, unit: '月', textOnly: false, ago: `${months} 个月前` };
      const years = Math.floor(days / 365);
      return { number: years, unit: '年', textOnly: false, ago: `${years} 年前` };
    }
    function growthDots(ts) {
      const days = ts ? Math.floor((Date.now() - ts) / 86400000) : 0;
      const count = Math.max(1, Math.min(18, days || 1));
      return Array.from({ length: count }, (_, i) => {
        const size = Math.round(5 + (i / Math.max(1, count - 1)) * 8);
        return `<span class="growth-dot" style="--dot-size:${size}px;--dot-index:${i}"></span>`;
      }).join('');
    }

    let expandedId = null;
    let menuId = null;
    let editingId = null;
    let selectedSticker = 'bedding';

    function render(flashId) {
      document.getElementById('todayLine').textContent = formatToday();
      const data = getData();
      const list = document.getElementById('itemList');
      if (!data.items.length) {
        list.innerHTML = `<div class="empty-state"><img src="./assets/tracker-stickers/sprout.png" alt=""><h2>先种下一件事</h2><p>这里只记录最近一次，不给生活打分。</p></div>`;
        return;
      }

      list.innerHTML = data.items.map((item, index) => {
        const entries = data.log.filter(entry => entry.itemId === item.id).sort((a,b) => b.time - a.time);
        const last = entries[0];
        const distance = distanceParts(last?.time);
        const stickerKey = stickerFor(item);
        const accent = TERRA_STICKERS.has(stickerKey) ? ' terra' : '';
        const isExpanded = expandedId === item.id;
        const menuOpen = menuId === item.id;
        const history = entries.slice(0, 30).map(entry => {
          const ago = distanceParts(entry.time).ago;
          return `<div class="history-entry"><span>${formatHistoryTime(entry.time)}</span><span class="history-ago">${escapeHTML(ago)}</span><button class="history-del" data-item="${escapeHTML(item.id)}" data-ts="${entry.time}">删除</button></div>`;
        }).join('');

        return `<article class="item-card${accent}${flashId === item.id ? ' flash' : ''}" id="card-${escapeHTML(item.id)}" style="animation-delay:${index * 0.035}s">
          <div class="card-core">
            <div class="card-heading">
              <div class="sticker-wrap"><img class="sticker" src="${STICKERS[stickerKey].src}" alt=""></div>
              <h2 class="item-name">${escapeHTML(item.name)}</h2>
            </div>
            <button class="manage-btn" data-id="${escapeHTML(item.id)}" aria-expanded="${menuOpen}">管理</button>
            <div class="distance-block">
              <div class="distance-main${distance.textOnly ? ' text-only' : ''}"><span class="distance-number">${escapeHTML(distance.number)}</span>${distance.unit ? `<span class="distance-word">${escapeHTML(distance.unit)}</span>` : ''}</div>
              <div class="last-date">${last ? `上次录于 ${formatShortDate(last.time)}` : '等你留下第一次记录'}</div>
            </div>
            <button class="log-btn" data-id="${escapeHTML(item.id)}">现在<br>记录</button>
            <div class="growth" aria-hidden="true">
              <img class="sprout" src="./assets/tracker-stickers/sprout.png" alt="">
              <div class="growth-track">${growthDots(last?.time)}</div>
              <div class="today-mark">今天</div>
            </div>
          </div>
          <div class="card-menu${menuOpen ? ' open' : ''}">
            <button class="menu-action history-toggle" data-id="${escapeHTML(item.id)}">${isExpanded ? '收起记录' : '查看记录'}</button>
            <button class="menu-action rename-btn" data-id="${escapeHTML(item.id)}">编辑</button>
            <button class="menu-action delete del-btn" data-id="${escapeHTML(item.id)}">删除</button>
          </div>
          <div class="history-panel${isExpanded ? ' open' : ''}">
            <div class="history-head"><span class="history-title">历史记录</span><span class="history-count">共 ${entries.length} 次</span></div>
            <div class="history-list">${history || '<div class="history-empty">还没有记录</div>'}</div>
          </div>
        </article>`;
      }).join('');
      bindCardEvents();
    }

    function bindCardEvents() {
      document.querySelectorAll('.log-btn').forEach(button => button.addEventListener('click', () => {
        const id = button.dataset.id;
        button.classList.add('popping');
        const data = getData();
        data.log.push({ itemId: id, time: Date.now() });
        saveData(data);
        render(id);
        showToast('已经记下这一刻');
      }));
      document.querySelectorAll('.manage-btn').forEach(button => button.addEventListener('click', () => {
        menuId = menuId === button.dataset.id ? null : button.dataset.id;
        render();
      }));
      document.querySelectorAll('.history-toggle').forEach(button => button.addEventListener('click', () => {
        expandedId = expandedId === button.dataset.id ? null : button.dataset.id;
        render();
      }));
      document.querySelectorAll('.rename-btn').forEach(button => button.addEventListener('click', () => openModal(button.dataset.id)));
      document.querySelectorAll('.del-btn').forEach(button => button.addEventListener('click', () => deleteItem(button.dataset.id)));
      document.querySelectorAll('.history-del').forEach(button => button.addEventListener('click', () => {
        const data = getData();
        const ts = Number(button.dataset.ts);
        data.log = data.log.filter(entry => !(entry.itemId === button.dataset.item && entry.time === ts));
        saveData(data);
        render();
      }));
    }

    function deleteItem(id) {
      const data = getData();
      const item = data.items.find(candidate => candidate.id === id);
      if (!item || !confirm(`删除「${item.name}」和它的全部记录？`)) return;
      data.items = data.items.filter(candidate => candidate.id !== id);
      data.log = data.log.filter(entry => entry.itemId !== id);
      saveData(data);
      expandedId = null;
      menuId = null;
      render();
    }
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function renderStickerPicker() {
      document.getElementById('stickerPicker').innerHTML = STICKER_ORDER.map(key => `<button class="sticker-choice${selectedSticker === key ? ' selected' : ''}" data-sticker="${key}" title="${STICKERS[key].label}" aria-label="${STICKERS[key].label}"><img src="${STICKERS[key].src}" alt=""></button>`).join('');
      document.querySelectorAll('.sticker-choice').forEach(button => button.addEventListener('click', () => {
        selectedSticker = button.dataset.sticker;
        renderStickerPicker();
      }));
    }
    function openModal(editId) {
      editingId = editId || null;
      const data = getData();
      const item = editId ? data.items.find(candidate => candidate.id === editId) : null;
      document.getElementById('modalTitle').textContent = item ? '编辑这件事' : '添加一件事';
      document.getElementById('inputName').value = item?.name || '';
      selectedSticker = item ? stickerFor(item) : 'bedding';
      renderStickerPicker();
      document.getElementById('modalBg').classList.add('open');
      window.setTimeout(() => document.getElementById('inputName').focus(), 80);
    }
    function closeModal() {
      document.getElementById('modalBg').classList.remove('open');
      editingId = null;
    }

    document.getElementById('inputName').addEventListener('input', event => {
      if (editingId || !event.target.value.trim()) return;
      const guessed = inferSticker(event.target.value);
      if (guessed !== selectedSticker) { selectedSticker = guessed; renderStickerPicker(); }
    });
    document.getElementById('inputName').addEventListener('keydown', event => {
      if (event.key === 'Enter') document.getElementById('modalConfirm').click();
    });
    document.getElementById('addBtn').addEventListener('click', () => openModal());
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalBg').addEventListener('click', event => { if (event.target.id === 'modalBg') closeModal(); });
    document.getElementById('modalConfirm').addEventListener('click', () => {
      const name = document.getElementById('inputName').value.trim();
      if (!name) { document.getElementById('inputName').focus(); return; }
      const data = getData();
      if (editingId) {
        const item = data.items.find(candidate => candidate.id === editingId);
        if (item) { item.name = name; item.sticker = selectedSticker; }
      } else {
        const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        data.items.push({ id, name, sticker: selectedSticker });
      }
      saveData(data);
      closeModal();
      render();
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(getData(), null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const d = new Date();
      link.href = url;
      link.download = `最近一次-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
      link.click();
      URL.revokeObjectURL(url);
    });
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = loadEvent => {
        try {
          const imported = safeData(JSON.parse(loadEvent.target.result));
          const existing = getData();
          const ids = new Set(existing.items.map(item => item.id));
          imported.items.forEach(item => { if (!ids.has(item.id)) existing.items.push(item); });
          imported.log.forEach(entry => existing.log.push(entry));
          saveData(existing);
          render();
          showToast('备份已导入');
        } catch { alert('文件格式不对，请选择之前导出的 JSON 备份。'); }
        event.target.value = '';
      };
      reader.readAsText(file);
    });

    render();
    window.setInterval(() => render(), 60000);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
