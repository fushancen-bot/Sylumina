<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>碎碎念</title>
  <style>
    /* 汇文明朝体 — 与 HTML 文件放在同一文件夹即可 */
    @font-face {
      font-family: 'Huiwen Mincho';
      src: url('./汇文明朝体.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-serif: 'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif;
      --font-system: -apple-system, 'Helvetica Neue', 'PingFang SC', sans-serif;
      --font-mincho: 'Huiwen Mincho', 'Songti SC', serif;
      --font-current: var(--font-serif);
      --font-accent: 'EB Garamond', Georgia, serif;
      --font-italic: 'Crimson Pro', Georgia, serif;

      --bg: #f6f2ec;
      --text-primary: #2a2520;
      --text-body: rgba(42,37,32,0.88);
      --text-secondary: rgba(90,74,56,0.55);
      --text-faint: rgba(139,115,85,0.4);
      --accent-light: rgba(139,115,85,0.12);
      --card-bg: rgba(255,255,255,0.5);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font-current);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -120px; right: -80px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(139,115,85,0.06) 0%, transparent 70%);
      animation: breathe 6s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }

    @keyframes breathe { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 200;
    }

    /* Header */
    header {
      padding-top: 56px;
      padding-bottom: 32px;
      animation: fadeUp 0.8s ease-out both;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 {
      font-family: var(--font-current);
      font-size: 26px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.06em;
    }
    h1 .accent {
      display: inline-block;
      border-bottom: 2px solid rgba(168,132,88,0.4);
      padding-bottom: 2px;
    }

    /* Font picker */
    .font-wrap { position: relative; }
    .font-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(139,115,85,0.15);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-faint);
      font-family: var(--font-accent);
      font-style: italic;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .font-btn.open { background: rgba(139,115,85,0.1); }
    .font-drop {
      display: none;
      position: absolute; top: 36px; right: 0;
      background: rgba(246,242,236,0.97);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139,115,85,0.12);
      border-radius: 12px;
      padding: 8px 4px;
      box-shadow: 0 8px 32px rgba(42,37,32,0.08);
      z-index: 100; min-width: 140px;
      animation: fadeUp 0.25s ease-out both;
    }
    .font-drop.show { display: block; }
    /* 透明遮罩，防止手机上点击穿透到下方输入框 */
    .font-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99;
    }
    .font-backdrop.show { display: block; }
    .font-opt {
      display: block; width: 100%;
      text-align: left; font-size: 14px;
      padding: 7px 14px;
      border: none; border-radius: 8px;
      cursor: pointer;
      background: transparent;
      color: rgba(90,74,56,0.6);
      transition: all 0.15s;
    }
    .font-opt.active { background: rgba(139,115,85,0.1); color: rgba(90,74,56,0.85); }
    .font-opt:hover:not(.active) { background: rgba(139,115,85,0.05); }

    /* Input area */
    .input-card {
      margin-bottom: 32px;
      padding: 20px;
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid rgba(139,115,85,0.08);
      animation: fadeUp 0.5s ease-out both;
    }
    textarea {
      width: 100%;
      min-height: 90px;
      font-family: var(--font-current);
      font-size: 14.5px;
      font-weight: 300;
      color: var(--text-primary);
      background: transparent;
      border: none; outline: none;
      resize: vertical;
      line-height: 1.85;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }
    .moods { display: flex; gap: 6px; }
    .mood-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(139,115,85,0.1);
      background: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .mood-btn:hover { transform: scale(1.15); background: rgba(139,115,85,0.08); }
    .mood-btn.sel {
      transform: scale(1.15);
      background: rgba(139,115,85,0.15);
      border-color: rgba(139,115,85,0.3);
    }
    .save-btn {
      font-family: var(--font-current);
      font-size: 12px;
      padding: 6px 18px;
      border-radius: 16px; border: none;
      background: rgba(139,115,85,0.15);
      color: rgba(90,74,56,0.35);
      cursor: default;
      transition: all 0.3s;
    }
    .save-btn.ready {
      background: rgba(90,74,56,0.85);
      color: #f6f2ec;
      cursor: pointer;
    }

    /* Entries */
    .entry {
      margin-bottom: 24px;
      padding-left: 20px;
      border-left: 2px solid rgba(139,115,85,0.1);
      position: relative;
    }
    .entry-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .entry-head .e-mood { font-size: 16px; }
    .entry-head .e-date {
      font-family: var(--font-current);
      font-size: 12px;
      color: rgba(90,74,56,0.45);
    }
    .entry-head .e-time {
      font-family: var(--font-accent);
      font-size: 12px;
      color: rgba(139,115,85,0.3);
    }
    .entry p {
      font-family: var(--font-current);
      font-size: 14px;
      font-weight: 300;
      color: var(--text-body);
      line-height: 1.9;
      white-space: pre-wrap;
    }
    .entry .del, .entry .edit-btn {
      position: absolute;
      top: 0;
      background: none; border: none;
      font-size: 11px;
      color: rgba(139,115,85,0.2);
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
    }
    .entry .del { right: 0; }
    .entry .edit-btn { right: 36px; }
    .entry:hover .del,
    .entry:hover .edit-btn { opacity: 1; }
    .entry .del:hover { color: rgba(180,80,80,0.6); }
    .entry .edit-btn:hover { color: rgba(90,74,56,0.6); }

    /* Inline edit mode */
    .entry.editing .edit-btn { opacity: 1; color: rgba(90,74,56,0.5); }
    .entry-edit-area {
      width: 100%;
      font-family: var(--font-current);
      font-size: 14px;
      font-weight: 300;
      color: var(--text-body);
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(139,115,85,0.15);
      border-radius: 8px;
      padding: 8px 10px;
      outline: none;
      resize: vertical;
      line-height: 1.9;
    }
    .edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .edit-save, .edit-cancel {
      font-family: var(--font-current);
      font-size: 11px;
      padding: 4px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .edit-save {
      background: rgba(90,74,56,0.8);
      color: #f6f2ec;
    }
    .edit-cancel {
      background: rgba(139,115,85,0.1);
      color: rgba(90,74,56,0.6);
    }

    /* Clickable time */
    .e-time {
      cursor: pointer;
      transition: color 0.2s;
    }
    .e-time:hover { color: rgba(139,115,85,0.6) !important; }
    .e-edited {
      font-family: var(--font-accent);
      font-size: 11px;
      color: rgba(139,115,85,0.35);
      font-style: italic;
    }
    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--text-faint);
      font-size: 14px;
      font-family: var(--font-current);
      animation: fadeUp 0.6s ease-out 0.3s both;
    }

    /* Date separator */
    .date-sep {
      font-family: var(--font-accent);
      font-size: 12px;
      color: rgba(139,115,85,0.52);
      letter-spacing: 0.06em;
      margin: 28px 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .date-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(139,115,85,0.12), transparent);
    }

    /* Confirmation toast */
    .toast {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(246,242,236,0.95);
      backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 24px 36px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(42,37,32,0.12);
      z-index: 200;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .toast .t-emoji { font-size: 40px; margin-bottom: 8px; }
    .toast .t-text {
      font-family: var(--font-current);
      font-size: 14px;
      color: rgba(90,74,56,0.7);
    }

    /* System font — darken body text for readability */
    html[data-font="system"] .entry p,
    html[data-font="system"] textarea {
      color: rgba(42,37,32,0.95);
      font-weight: 400;
    }

    footer {
      padding: 48px 0 36px;
      text-align: center;
    }
    footer .line {
      width: 24px; height: 1px;
      background: rgba(139,115,85,0.2);
      margin: 0 auto 16px;
    }
    footer p {
      font-family: var(--font-accent);
      font-size: 12px;
      color: rgba(139,115,85,0.3);
      letter-spacing: 0.1em;
    }

    @media (max-width: 480px) {
      header { padding-top: 36px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>小山的<span class="accent">碎碎念</span></h1>
    <div class="font-wrap">
      <div class="font-backdrop" id="fontBackdrop"></div>
      <button class="font-btn" id="fontBtn">A</button>
      <div class="font-drop" id="fontDrop"></div>
    </div>
  </header>

  <!-- Input -->
  <div class="input-card">
    <textarea id="text" placeholder="此刻在想什么…"></textarea>
    <div class="toolbar">
      <div class="moods" id="moods">
        <button class="mood-btn" data-m="🌟">🌟</button>
        <button class="mood-btn" data-m="☀️">☀️</button>
        <button class="mood-btn" data-m="🌿">🌿</button>
        <button class="mood-btn" data-m="☁️">☁️</button>
        <button class="mood-btn" data-m="🌙">🌙</button>
      </div>
      <button class="save-btn" id="saveBtn">记下</button>
    </div>
  </div>

  <!-- Entries -->
  <div id="entries"></div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="t-emoji" id="toastEmoji">✨</div>
    <div class="t-text">记下了</div>
  </div>

  <footer>
    <div class="line"></div>
    <p>只有你自己能看到这些</p>
  </footer>
</div>

<script>
// ===== Font =====
const FONTS = [
  { key: 'serif',  label: '宋体', family: "'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif" },
  { key: 'system', label: '系统', family: "-apple-system, 'Helvetica Neue', 'PingFang SC', sans-serif" },
  { key: 'mincho', label: '明朝', family: "'Huiwen Mincho', 'Songti SC', serif" },
];
let fontIdx = parseInt(localStorage.getItem('xshan_font2') || '0');

const fontBtn = document.getElementById('fontBtn');
const fontDrop = document.getElementById('fontDrop');
const fontBackdrop = document.getElementById('fontBackdrop');

function closeFontDrop() {
  fontDrop.classList.remove('show');
  fontBtn.classList.remove('open');
  fontBackdrop.classList.remove('show');
}

function renderFonts() {
  fontDrop.innerHTML = FONTS.map((f, i) =>
    `<button class="font-opt ${i === fontIdx ? 'active' : ''}" data-i="${i}" style="font-family:${f.family}">${f.label} · 碎碎念</button>`
  ).join('');

  fontDrop.querySelectorAll('.font-opt').forEach(btn => {
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
    }, { passive: false });
    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      fontIdx = parseInt(btn.dataset.i);
      applyFont();
      closeFontDrop();
    }, { passive: false });
  });
}

function applyFont() {
  document.documentElement.style.setProperty('--font-current', FONTS[fontIdx].family);
  document.documentElement.setAttribute('data-font', FONTS[fontIdx].key);
  localStorage.setItem('xshan_font2', fontIdx);
  renderFonts();
}

fontBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const opening = !fontDrop.classList.contains('show');
  fontDrop.classList.toggle('show');
  fontBtn.classList.toggle('open');
  fontBackdrop.classList.toggle('show', opening);
});

fontDrop.addEventListener('click', (e) => {
  e.stopPropagation();
  const b = e.target.closest('.font-opt');
  if (!b) return;
  fontIdx = parseInt(b.dataset.i);
  applyFont();
  closeFontDrop();
});

fontBackdrop.addEventListener('click', closeFontDrop);
fontBackdrop.addEventListener('touchend', (e) => { e.preventDefault(); closeFontDrop(); });

document.addEventListener('click', closeFontDrop);

applyFont();

// ===== Journal Data =====
function getEntries() {
  try { return JSON.parse(localStorage.getItem('xshan_journal') || '[]'); }
  catch { return []; }
}

function saveEntries(entries) {
  localStorage.setItem('xshan_journal', JSON.stringify(entries));
}

// ===== Render =====
function fmtDate(ts) {
  const d = new Date(ts);
  const wd = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  return {
    date: `${d.getMonth()+1}月${d.getDate()}日 · ${wd}`,
    time: `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,
    dateKey: `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`,
  };
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function render() {
  const el = document.getElementById('entries');
  const entries = getEntries();

  if (!entries.length) {
    el.innerHTML = '<div class="empty">还没有碎碎念…<br>写下第一条吧 ✨</div>';
    return;
  }

  let html = '';
  let lastDateKey = '';

  entries.forEach((entry, i) => {
    const { date, time, dateKey } = fmtDate(entry.timestamp);

    // Date separator
    if (dateKey !== lastDateKey) {
      const label = dateKey === todayKey() ? '今天' : date;
      html += `<div class="date-sep">${label}</div>`;
      lastDateKey = dateKey;
    }

    const escaped = entry.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const editedLabel = entry.editedAt
      ? `<span class="e-edited" id="edited-${i}" style="display:none">编辑于 ${fmtDate(entry.editedAt).time}</span>`
      : '';
    html += `
      <div class="entry" id="entry-${i}" style="animation: slideIn 0.4s ease-out ${Math.min(0.08*i, 0.6)}s both">
        <div class="entry-head">
          <span class="e-mood">${entry.mood || '💭'}</span>
          <span class="e-date">${date}</span>
          <span class="e-time" data-i="${i}" title="点击查看编辑时间">${time}</span>
          ${editedLabel}
        </div>
        <p id="text-${i}">${escaped}</p>
        <button class="edit-btn" data-i="${i}">编辑</button>
        <button class="del" data-i="${i}">删除</button>
      </div>
    `;
  });

  el.innerHTML = html;

  el.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('删掉这条碎碎念？')) return;
      const entries = getEntries();
      entries.splice(parseInt(btn.dataset.i), 1);
      saveEntries(entries);
      render();
    });
  });

  // Edit button
  el.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      const entryEl = document.getElementById(`entry-${i}`);
      const textEl = document.getElementById(`text-${i}`);
      const entries = getEntries();
      const entry = entries[i];

      if (entryEl.classList.contains('editing')) return;
      entryEl.classList.add('editing');

      const textarea = document.createElement('textarea');
      textarea.className = 'entry-edit-area';
      textarea.value = entry.content;
      textarea.rows = Math.max(3, entry.content.split('\n').length);

      const actions = document.createElement('div');
      actions.className = 'edit-actions';
      actions.innerHTML = `<button class="edit-save">保存</button><button class="edit-cancel">取消</button>`;

      textEl.replaceWith(textarea);
      textarea.after(actions);
      textarea.focus();

      actions.querySelector('.edit-cancel').addEventListener('click', () => render());
      actions.querySelector('.edit-save').addEventListener('click', () => {
        const newContent = textarea.value.trim();
        if (!newContent) return;
        entries[i].content = newContent;
        entries[i].editedAt = Date.now();
        saveEntries(entries);
        render();
      });
    });
  });

  // Click time to toggle edited time
  el.querySelectorAll('.e-time').forEach(span => {
    span.addEventListener('click', () => {
      const i = parseInt(span.dataset.i);
      const editedEl = document.getElementById(`edited-${i}`);
      if (!editedEl) return;
      const visible = editedEl.style.display !== 'none';
      editedEl.style.display = visible ? 'none' : 'inline';
    });
  });
}

// ===== Mood Selection =====
let selectedMood = null;
const moodBtns = document.querySelectorAll('.mood-btn');

moodBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    moodBtns.forEach(b => b.classList.remove('sel'));
    if (selectedMood === btn.dataset.m) {
      selectedMood = null;
    } else {
      selectedMood = btn.dataset.m;
      btn.classList.add('sel');
    }
  });
});

// ===== Save =====
const textEl = document.getElementById('text');
const saveBtnEl = document.getElementById('saveBtn');
const toast = document.getElementById('toast');
const toastEmoji = document.getElementById('toastEmoji');

textEl.addEventListener('input', () => {
  saveBtnEl.classList.toggle('ready', textEl.value.trim().length > 0);
});

saveBtnEl.addEventListener('click', () => {
  const content = textEl.value.trim();
  if (!content) return;

  const entries = getEntries();
  entries.unshift({
    content,
    mood: selectedMood || '💭',
    timestamp: Date.now(),
  });
  saveEntries(entries);

  // Show toast
  toastEmoji.textContent = selectedMood || '✨';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1200);

  // Reset
  textEl.value = '';
  selectedMood = null;
  moodBtns.forEach(b => b.classList.remove('sel'));
  saveBtnEl.classList.remove('ready');
  render();
});

// ===== Keyboard shortcut =====
textEl.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    saveBtnEl.click();
  }
});

render();
</script>

</body>
</html>
